when:
  event: [push, tag, pull_request]

steps:
  build:
    image: archlinux:latest
    commands:
      - pacman -Syu --noconfirm
      - pacman -S --needed --noconfirm base-devel git zig wayland wayland-protocols cairo dbus libxkbcommon pkg-config
      - zig build
      - zig build -Doptimize=ReleaseSafe
      - ls -lh zig-out/bin/sneemok
    when:
      event: [push, pull_request]

  release-artifacts:
    image: archlinux:latest
    commands:
      - pacman -Syu --noconfirm
      - pacman -S --needed --noconfirm base-devel git zig wayland wayland-protocols cairo dbus libxkbcommon pkg-config tar

      - zig build -Doptimize=ReleaseSafe

      - export VERSION=${CI_COMMIT_TAG#v}
      - echo "Building version $VERSION"

      - mkdir -p sneemok-$VERSION-x86_64-linux
      - cp zig-out/bin/sneemok sneemok-$VERSION-x86_64-linux/
      - cp LICENSE sneemok-$VERSION-x86_64-linux/ || echo "No LICENSE file"
      - cp README.md sneemok-$VERSION-x86_64-linux/ || echo "No README file"
      - tar czf sneemok-$VERSION-x86_64-linux.tar.gz sneemok-$VERSION-x86_64-linux/

      - git archive --format=tar.gz --prefix=sneemok-$VERSION/ HEAD -o sneemok-$VERSION-source.tar.gz

      - sha256sum sneemok-$VERSION-*.tar.gz > checksums.txt

      - ls -lh *.tar.gz
      - cat checksums.txt
    when:
      event: tag

  forgejo-release:
    image: woodpeckerci/plugin-gitea-release
    settings:
      api_key:
        from_secret: gitea_token
      base_url: https://codeberg.org
      files:
        - "*.tar.gz"
        - checksums.txt
      title: ${CI_COMMIT_TAG}
      note: |
        Release ${CI_COMMIT_TAG}

        ## Installation

        ### Download Binary

        ```bash
        wget https://codeberg.org/fn3x/sneemok/releases/download/${CI_COMMIT_TAG}/sneemok-${CI_COMMIT_TAG#v}-x86_64-linux.tar.gz
        tar xzf sneemok-${CI_COMMIT_TAG#v}-x86_64-linux.tar.gz
        cd sneemok-${CI_COMMIT_TAG#v}-x86_64-linux
        sudo install -m 755 sneemok /usr/local/bin/
        ```

        ### NixOS

        ```nix
        inputs.sneemok.url = "https://codeberg.org/fn3x/sneemok/${CI_COMMIT_TAG}";
        services.sneemok.enable = true;
        ```

        ### Arch Linux (AUR)

        ```bash
        paru -S sneemok
        ```

        ### Build from Source

        ```bash
        wget https://codeberg.org/fn3x/sneemok/releases/download/${CI_COMMIT_TAG}/sneemok-${CI_COMMIT_TAG#v}-source.tar.gz
        tar xzf sneemok-${CI_COMMIT_TAG#v}-source.tar.gz
        cd sneemok-${CI_COMMIT_TAG#v}
        zig build -Doptimize=ReleaseSafe
        sudo install -m 755 zig-out/bin/sneemok /usr/local/bin/
        ```

        ## Checksums

        See checksums.txt for SHA256 hashes.
    when:
      event: tag

  update-aur:
    image: archlinux:latest
    environment:
      AUR_SSH_KEY:
        from_secret: aur_ssh_key
      GIT_USERNAME:
        from_secret: git_username
      GIT_EMAIL:
        from_secret: git_email
    commands:
      - pacman -Syu --noconfirm
      - pacman -S --needed --noconfirm git openssh

      - mkdir -p ~/.ssh
      - echo "$AUR_SSH_KEY" > ~/.ssh/aur
      - chmod 600 ~/.ssh/aur
      - echo "Host aur.archlinux.org" > ~/.ssh/config
      - echo "  IdentityFile ~/.ssh/aur" >> ~/.ssh/config
      - echo "  User aur" >> ~/.ssh/config
      - chmod 600 ~/.ssh/config

      - ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - export VERSION=${CI_COMMIT_TAG#v}

      - git clone ssh://aur@aur.archlinux.org/sneemok.git aur-repo
      - cd aur-repo

      - git config user.name "${GIT_USERNAME}"
      - git config user.email "${GIT_EMAIL}"

      - wget "https://codeberg.org/fn3x/sneemok/archive/${CI_COMMIT_TAG}.tar.gz" -O "sneemok-$VERSION.tar.gz"
      - export SHA256=$(sha256sum "sneemok-$VERSION.tar.gz" | awk '{print $1}')
      - echo "SHA256: $SHA256"

      - sed -i "s/pkgver=.*/pkgver=$VERSION/" PKGBUILD
      - sed -i "s/pkgrel=.*/pkgrel=1/" PKGBUILD
      - sed -i "s|url=.*|url=\"https://codeberg.org/fn3x/sneemok\"|" PKGBUILD
      - sed -i "s|source=.*|source=(\"sneemok-$VERSION.tar.gz::https://codeberg.org/fn3x/sneemok/archive/${CI_COMMIT_TAG}.tar.gz\")|" PKGBUILD
      - sed -i "s/sha256sums=.*/sha256sums=('$SHA256')/" PKGBUILD

      - pacman -S --needed --noconfirm base-devel
      - useradd -m builder
      - chown -R builder:builder .
      - sudo -u builder makepkg --printsrcinfo > .SRCINFO

      - git add PKGBUILD .SRCINFO
      - git commit -m "Update to $VERSION"
      - git push origin master

      - echo "AUR package updated to $VERSION"
    when:
      event: tag
